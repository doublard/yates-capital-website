<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yates Capital</title>
    <meta name="description" content="Private holding company. Equities, investments & property.">
    <meta property="og:title" content="Yates Capital">
    <meta property="og:description" content="Private holding company. Equities, investments & property.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="favicon.svg">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Yates Capital">
    <meta name="twitter:description" content="Private holding company. Equities, investments & property.">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=EB+Garamond:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        ::selection {
            background-color: #B8A06A;
            color: #F5F0E8;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            background-color: #F5F0E8;
            color: #1A1710;
            font-family: 'EB Garamond', serif;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
        }

        /* Paper grain texture overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 10;
            opacity: 0.4;
            filter: url(#grain);
        }

        /* Optional faint crest watermark */
        .crest {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 280px;
            height: 280px;
            opacity: 0.035;
            pointer-events: none;
            z-index: 0;
        }

        .page {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            position: relative;
            z-index: 1;
            padding: 2rem;
        }

        .rule {
            width: 80px;
            height: 1px;
            background-color: #B8A06A;
            border: none;
            opacity: 0;
            animation: fadeIn 1.2s ease forwards, breathe 5s ease-in-out 2.5s infinite;
        }

        .rule--top {
            animation-delay: 0s;
        }

        .wordmark {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 300;
            font-size: clamp(2.8rem, 6vw, 6rem);
            letter-spacing: 0.3em;
            text-transform: uppercase;
            margin: 2rem 0;
            line-height: 1.1;
            opacity: 0;
            animation: fadeIn 1.2s ease forwards;
            animation-delay: 0.2s;
        }

        .rule--bottom {
            animation-delay: 0.4s;
        }

        .tagline {
            font-family: 'EB Garamond', serif;
            font-size: clamp(0.95rem, 1.8vw, 1.15rem);
            font-weight: 400;
            color: #6B6355;
            letter-spacing: 0.12em;
            margin-top: 2rem;
            text-transform: uppercase;
            opacity: 0;
            animation: fadeIn 1.2s ease forwards;
            animation-delay: 0.6s;
        }

        .tagline--sub {
            margin-top: 0.6rem;
            animation-delay: 0.8s;
        }

        .contact {
            margin-top: 3rem;
            opacity: 0;
            animation: fadeIn 1.2s ease forwards;
            animation-delay: 1.0s;
        }

        .contact a {
            font-family: 'EB Garamond', serif;
            font-size: 0.8rem;
            color: #6B6355;
            text-decoration: none;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            position: relative;
            font-variant: small-caps;
        }

        .contact a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 1px;
            background-color: #B8A06A;
            transition: width 0.4s ease;
        }

        .contact a:hover::after {
            width: 100%;
        }

        .established {
            position: fixed;
            bottom: 2.5rem;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'EB Garamond', serif;
            font-size: 0.7rem;
            color: #6B6355;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            opacity: 0;
            animation: fadeIn 1.2s ease forwards;
            animation-delay: 1.2s;
            z-index: 1;
        }

        @keyframes breathe {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Maintain centred feel on very short viewports */
        @media (max-height: 500px) {
            .established {
                position: relative;
                bottom: auto;
                margin-top: 2rem;
            }
        }

        @media (max-width: 480px) {
            .wordmark {
                letter-spacing: 0.18em;
            }
            .contact {
                margin-top: 2rem;
            }
        }
        @media print {
            body::before { display: none; }
            .crest { display: none; }
            * { animation: none !important; opacity: 1 !important; }
            .established { position: static; transform: none; margin-top: 3rem; }
            .rule { background-color: #1A1710; }
        }
    </style>
</head>
<body>

    <!-- SVG noise filter for paper grain -->
    <svg style="position:absolute;width:0;height:0;" aria-hidden="true">
        <filter id="grain">
            <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
            <feColorMatrix type="saturate" values="0"/>
            <feBlend in="SourceGraphic" mode="multiply"/>
        </filter>
    </svg>

    <!-- Faint geometric crest watermark -->
    <svg class="crest" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <polygon points="100,10 190,60 190,140 100,190 10,140 10,60" fill="none" stroke="#1A1710" stroke-width="1"/>
        <polygon points="100,30 170,70 170,130 100,170 30,130 30,70" fill="none" stroke="#1A1710" stroke-width="0.5"/>
        <line x1="100" y1="10" x2="100" y2="190" stroke="#1A1710" stroke-width="0.5"/>
        <line x1="10" y1="100" x2="190" y2="100" stroke="#1A1710" stroke-width="0.5"/>
    </svg>

    <main class="page">
        <hr class="rule rule--top">
        <h1 class="wordmark">Yates Capital</h1>
        <hr class="rule rule--bottom">
        <p class="tagline">Equities, investments &amp; property.</p>
        <p class="tagline tagline--sub">Website coming soon.</p>
        <div class="contact">
            <a href="mailto:contact@yatescapital.co.uk">contact@yatescapital.co.uk</a>
        </div>
    </main>

    <footer class="established">Est. MMXIX</footer>

</body>
</html>
